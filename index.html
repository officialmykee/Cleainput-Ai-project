<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build with AI</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(
        circle at top left,
        rgba(255,210,240,.9),
        rgba(240,235,255,.9) 45%,
        rgba(228,240,255,.95) 100%
    );
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(rgba(120,120,120,.12) 1px, transparent 1px);
    background-size:18px 18px;
    pointer-events:none;
}

.screen{
    width:100%;
    max-width:780px;
    padding:0 24px;
    text-align:center;
    position:relative;
    z-index:1;
}

h1{
    font-family:'Sora',sans-serif;
    font-size:clamp(36px,5.5vw,68px);
    font-weight:800;
    line-height:1.13;
    letter-spacing:-.02em;
    color:#1a1a2e;
    margin-bottom:22px;
}

h1 .highlight{
    background:linear-gradient(95deg,#a855f7,#4ea7ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.sub{
    font-size:clamp(16px,1.8vw,19px);
    color:#5a5a7a;
    line-height:1.65;
    max-width:560px;
    margin:0 auto 32px;
    font-weight:400;
}

/* Composer box */
.composer{
    background:#fff;
    border-radius:20px;
    padding:18px 18px 14px;
    max-width:620px;
    margin:0 auto;
    box-shadow:0 8px 40px rgba(120,80,220,.13), 0 2px 8px rgba(0,0,0,.06);
    border:1px solid rgba(200,190,230,.35);
}

.composer-input{
    width:100%;
    min-height:46px;
    font-family:'Inter',sans-serif;
    font-size:16px;
    color:#1a1a2e;
    outline:none;
    line-height:1.6;
    text-align:left;
    caret-color:#a855f7;
    word-break:break-word;
}

.composer-input:empty::before{
    content:attr(data-placeholder);
    color:#b8b5cc;
    pointer-events:none;
}

.composer-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:12px;
}

.composer-left{
    display:flex;
    gap:8px;
    align-items:center;
}

.icon-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:#f3f1fb;
    color:#7c5cbf;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .15s, transform 0.1s;
    flex-shrink:0;
}

.icon-btn:hover{
    background:#e8e4f7;
}

.icon-btn:active {
    transform: scale(0.95);
}

.icon-btn svg{
    width:16px;
    height:16px;
}

#statusLog {
    font-size: 12px;
    color: #a855f7;
    margin-top: 15px;
    font-weight: 500;
}
</style>
</head>
<body>

<div class="screen">

    <h1>
        Turn your idea into<br>
        a <span class="highlight">live product</span> today
    </h1>

    <p class="sub">
        Describe what you want to build, and watch it come to life —
        fully functional, ready to ship, no code required.
    </p>

    <div class="composer">
        <div
            class="composer-input"
            contenteditable="true"
            data-placeholder="Describe the app you want to build..."
        ></div>
        <div class="composer-bar">
            <div class="composer-left">
                <button class="icon-btn" title="Compile and Build APK" onclick="submitUserPrompt()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 16 12 12 8 16"></polyline>
                        <line x1="12" y1="12" x2="12" y2="21"></line>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                        <polyline points="16 16 12 12 8 16"></polyline>
                    </svg>
                </button>
                <span style="border:1.5px solid #c4b8e8;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:500;color:#7c5cbf;letter-spacing:.02em;display:inline-flex;align-items:center;">react native</span>
            </div>
            <button class="icon-btn" title="Voice input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9.75 7.75C9.75 7.33579 9.41421 7 9 7H7.81597H6.29847C6.66598 4.17873 9.07855 2 12 2C14.9214 2 17.334 4.17873 17.7015 7H16.184L13.5 7C13.0858 7 12.75 7.33579 12.75 7.75C12.75 8.16421 13.0858 8.5 13.5 8.5L16.25 8.5H17.75V10H16.25H13.5C13.0858 10 12.75 10.3358 12.75 10.75C12.75 11.1642 13.0858 11.5 13.5 11.5H16.184H17.7015C17.334 14.3213 14.9214 16.5 12 16.5C9.07855 16.5 6.66598 14.3213 6.29847 11.5H7.81597H9C9.41421 11.5 9.75 11.1642 9.75 10.75C9.75 10.3358 9.41421 10 9 10H7.75H6.25V8.5H7.75H9C9.41421 8.5 9.75 8.16421 9.75 7.75Z" fill="#7c5cbf"/>
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M4 9C4.41421 9 4.75 9.33579 4.75 9.75V10.75C4.75 14.7541 7.99594 18 12 18C16.0041 18 19.25 14.7541 19.25 10.75V9.75C19.25 9.33579 19.5858 9 20 9C20.4142 9 20.75 9.33579 20.75 9.75V10.75C20.75 15.3298 17.2314 19.0879 12.75 19.4683V21.75C12.75 22.1642 12.4142 22.5 12 22.5C11.5858 22.5 11.25 22.1642 11.25 21.75V19.4683C6.7686 19.0879 3.25 15.3298 3.25 10.75V9.75C3.25 9.33579 3.58579 9 4 9Z" fill="#7c5cbf"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div id="statusLog"></div>

</div>

<script>
const input = document.querySelector('.composer-input');
const statusLog = document.getElementById('statusLog');

input.addEventListener('input', () => {
    if (input.innerText.trim() === '') {
        input.innerHTML = '';
    }
});

async function submitUserPrompt() {
    const promptText = input.innerText.trim();
    if (!promptText) {
        statusLog.textContent = "Please describe your layout concept first.";
        return;
    }

    statusLog.textContent = "Passing description to C++ AST parsing engine via Cerebrium...";

    // Mock layout parser payload matching parser.cpp parameters
    const structuralPayload = {
        type: "TouchableOpacity",
        content: promptText,
        style: "flex:1,backgroundColor:'#a855f7',justifyContent:'center',borderRadius:12"
    };

    try {
        const response = await fetch('https://run.cerebrium.ai/cleaninput-ai-engine/predict', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer YOUR_CEREBRIUM_JWT_TOKEN'
            },
            body: JSON.stringify({ payload: structuralPayload })
        });

        const data = await response.json();
        if (data.status === "success") {
            statusLog.innerHTML = `<span style="color:#22c55e;">Compilation Success! React Native source tree established.</span>`;
            console.log(data.react_native_source);
        } else {
            statusLog.textContent = "Compilation Failure: " + (data.error_log || data.message);
        }
    } catch (err) {
        statusLog.textContent = "Routing Failure: " + err.message;
    }
}
</script>
</body>
</html>
