<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build with AI</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(
        circle at top left,
        rgba(255,210,240,.9),
        rgba(240,235,255,.9) 45%,
        rgba(228,240,255,.95) 100%
    );
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(rgba(120,120,120,.12) 1px, transparent 1px);
    background-size:18px 18px;
    pointer-events:none;
}

.screen{
    width:100%;
    max-width:780px;
    padding:0 24px;
    text-align:center;
    position:relative;
    z-index:1;
}

h1{
    font-family:'Sora',sans-serif;
    font-size:clamp(36px,5.5vw,68px);
    font-weight:800;
    line-height:1.13;
    letter-spacing:-.02em;
    color:#1a1a2e;
    margin-bottom:22px;
}

h1 .highlight{
    background:linear-gradient(95deg,#a855f7,#4ea7ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.sub{
    font-size:clamp(16px,1.8vw,19px);
    color:#5a5a7a;
    line-height:1.65;
    max-width:560px;
    margin:0 auto 32px;
    font-weight:400;
}

/* Composer box */
.composer{
    background:#fff;
    border-radius:20px;
    padding:18px 18px 14px;
    max-width:620px;
    margin:0 auto;
    box-shadow:0 8px 40px rgba(120,80,220,.13), 0 2px 8px rgba(0,0,0,.06);
    border:1px solid rgba(200,190,230,.35);
}

.composer-input{
    width:100%;
    min-height:46px;
    font-family:'Inter',sans-serif;
    font-size:16px;
    color:#1a1a2e;
    outline:none;
    line-height:1.6;
    text-align:left;
    caret-color:#a855f7;
    word-break:break-word;
}

.composer-input:empty::before{
    content:attr(data-placeholder);
    color:#b8b5cc;
    pointer-events:none;
}

.composer-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:12px;
}

.composer-left{
    display:flex;
    gap:8px;
    align-items:center;
}

.icon-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:#f3f1fb;
    color:#7c5cbf;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .15s, transform 0.1s;
    flex-shrink:0;
}

.icon-btn:hover{
    background:#e8e4f7;
}

.icon-btn:active {
    transform: scale(0.95);
}

.icon-btn svg{
    width:16px;
    height:16px;
}

/* Send button — right side */
#sendBtn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
    /* idle: outline style */
    background: #f3f1fb;
    color: #b8b5cc;
    box-shadow: none;
}

#sendBtn svg {
    width: 16px;
    height: 16px;
    transition: color 0.18s;
}

#sendBtn.has-text {
    background: linear-gradient(135deg, #a855f7, #4ea7ff);
    color: #fff;
    box-shadow: 0 4px 14px rgba(168,85,247,.35);
}

#sendBtn.has-text:hover {
    opacity: 0.88;
    transform: scale(1.06);
}

#sendBtn:not(.has-text):hover {
    background: #edeaf5;
    color: #9d84d4;
}

#sendBtn:active {
    transform: scale(0.94);
}

#statusLog {
    font-size: 12px;
    color: #a855f7;
    margin-top: 15px;
    font-weight: 500;
}

/* Header */
.site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: radial-gradient(
        circle at top left,
        rgba(255,210,240,.9),
        rgba(240,235,255,.9) 45%,
        rgba(228,240,255,.95) 100%
    );
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.07);
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 24px;
}

.header-inner {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo-area {
    display: flex;
    align-items: center;
    text-decoration: none;
}

.logo-name {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}

.btn-signin {
    background: linear-gradient(95deg, #a855f7, #4ea7ff);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 6px 16px;
    height: 34px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.01em;
    white-space: nowrap;
    transition: opacity 0.15s;
}
.btn-signin:hover { opacity: 0.88; }

.btn-signup {
    background: transparent;
    color: #1a1a2e;
    border: 1.5px solid #d8d5cf;
    border-radius: 7px;
    padding: 6px 16px;
    height: 34px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.01em;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
}
.btn-signup:hover { background: rgba(0,0,0,0.05); border-color: #bbb8b2; }

.btn-menu {
    width: 38px;
    height: 38px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5.5px;
    padding: 0;
    margin-left: 4px;
}
.btn-menu span {
    display: block;
    width: 20px;
    height: 2px;
    background: #1a1a2e;
    border-radius: 2px;
}

/* Auth Full Page */
.auth-page {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #fff;
    overflow-y: auto;
    animation: pageFadeIn 0.2s ease;
}
.auth-page.active { display: block; }
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.auth-close {
    position: fixed;
    top: 16px;
    right: 20px;
    width: 36px; height: 36px;
    border: none;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #1a1a2e;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: background 0.15s;
    z-index: 201;
}
.auth-close:hover { background: #fff; }

.auth-inner {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 32px 40px;
    position: relative;
    z-index: 1;
}

.auth-card {
    background: transparent;
    width: 100%;
    max-width: 420px;
}

.auth-brand {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 28px;
}

.auth-title {
    font-family: 'Sora', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 6px;
}
.auth-sub {
    font-size: 14px;
    color: #7a7a9a;
    margin-bottom: 28px;
    line-height: 1.5;
}

.social-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 11px 16px;
    border-radius: 10px;
    border: 1.5px solid #e8e5f0;
    background: #f5f4f8;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #1a1a2e;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background 0.15s;
}
.social-btn:hover { background: #edeaf5; }

.auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0;
    color: #aaa;
    font-size: 13px;
}
.auth-divider::before, .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e8e8ee;
}

.field-label {
    font-size: 13px;
    font-weight: 500;
    color: #1a1a2e;
    margin-bottom: 6px;
    display: block;
}
.field-wrap {
    position: relative;
    margin-bottom: 16px;
}
.field-wrap svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: #aaa;
}
.field-input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1.5px solid #e0dde8;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #1a1a2e;
    outline: none;
    transition: border-color 0.15s;
    background: #fff;
}
.field-input::placeholder { color: #bbb; }
.field-input:focus { border-color: #a855f7; background: #fff; }

.auth-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    font-size: 13px;
}
.remember {
    display: flex;
    align-items: center;
    gap: 7px;
    color: #555;
    cursor: pointer;
}
.remember input[type=checkbox] {
    accent-color: #a855f7;
    width: 15px; height: 15px;
    cursor: pointer;
}
.forgot { color: #7a7a9a; cursor: pointer; text-decoration: none; }
.forgot:hover { color: #a855f7; }

.auth-submit {
    width: 100%;
    padding: 13px;
    background: linear-gradient(95deg, #a855f7, #4ea7ff);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: opacity 0.15s;
    margin-bottom: 18px;
}
.auth-submit:hover { opacity: 0.9; }

.auth-switch {
    text-align: center;
    font-size: 13.5px;
    color: #7a7a9a;
}
.auth-switch a {
    color: #a855f7;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
}
.auth-switch a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <a href="#" class="logo-area">
            <span class="logo-name">Cleaninput</span>
        </a>
        <div class="header-actions">
            <button class="btn-signin" onclick="openAuth('login')">Sign in</button>
            <button class="btn-signup" onclick="openAuth('signup')">Sign up</button>
            <button class="btn-menu" aria-label="Menu">
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</header>

<div class="screen" style="padding-top:60px;">

    <h1>
        Turn your idea into<br>
        a <span class="highlight">live product</span> today
    </h1>

    <p class="sub">
        Describe what you want to build, and watch it come to life —
        fully functional, ready to ship, no code required.
    </p>

    <div class="composer">
        <div
            class="composer-input"
            contenteditable="true"
            data-placeholder="Describe the app you want to build..."
        ></div>
        <div class="composer-bar">
            <div class="composer-left">
                <button class="icon-btn" title="Compile and Build APK" onclick="submitUserPrompt()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 16 12 12 8 16"></polyline>
                        <line x1="12" y1="12" x2="12" y2="21"></line>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                        <polyline points="16 16 12 12 8 16"></polyline>
                    </svg>
                </button>
                <span style="border:1.5px solid #c4b8e8;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:500;color:#7c5cbf;letter-spacing:.02em;display:inline-flex;align-items:center;">react native</span>
            </div>

            <!-- Send / Arrow-up button -->
            <button id="sendBtn" title="Send" onclick="handleSendClick()">
                <!-- Arrow up icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div id="statusLog"></div>

</div>

<!-- Auth Full Page -->
<div class="auth-page" id="authPage">
  <button class="auth-close" onclick="closeAuth()">✕</button>
  <div class="auth-inner">
    <div class="auth-card">

      <!-- LOGIN VIEW -->
      <div id="loginView">

        <button class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign in with Google
        </button>
        <button class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Sign in with GitHub
        </button>

        <div class="auth-divider">or</div>

        <label class="field-label">Email</label>
        <div class="field-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input class="field-input" type="email" placeholder="Your email">
        </div>

        <label class="field-label">Password</label>
        <div class="field-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="field-input" type="password" placeholder="Your password">
        </div>

        <div class="auth-row">
          <label class="remember"><input type="checkbox" checked> Remember me</label>
          <a class="forgot">Forgot Password?</a>
        </div>

        <button class="auth-submit">Login</button>
        <div class="auth-switch">Don't have an account? <a onclick="switchView('signup')">Sign Up</a></div>
      </div>

      <!-- SIGNUP VIEW -->
      <div id="signupView" style="display:none">

        <button class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign up with Google
        </button>
        <button class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Sign up with GitHub
        </button>

        <div class="auth-divider">or</div>

        <label class="field-label">Full Name</label>
        <div class="field-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input class="field-input" type="text" placeholder="Your full name">
        </div>

        <label class="field-label">Email</label>
        <div class="field-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input class="field-input" type="email" placeholder="Your email">
        </div>

        <label class="field-label">Password</label>
        <div class="field-wrap" style="margin-bottom:22px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="field-input" type="password" placeholder="Create a password">
        </div>

        <button class="auth-submit">Create Account</button>
        <div class="auth-switch">Already have an account? <a onclick="switchView('login')">Sign In</a></div>
      </div>
    </div>
  </div>
</div>


<script>
function openAuth(view) {
    document.getElementById('authPage').classList.add('active');
    switchView(view);
}
function closeAuth() {
    document.getElementById('authPage').classList.remove('active');
}
function switchView(view) {
    document.getElementById('loginView').style.display = view === 'login' ? 'block' : 'none';
    document.getElementById('signupView').style.display = view === 'signup' ? 'block' : 'none';
}
</script>

<script>
const input = document.querySelector('.composer-input');
const statusLog = document.getElementById('statusLog');
const sendBtn = document.getElementById('sendBtn');

// Update send button state based on input content
function updateSendBtn() {
    const hasText = input.innerText.trim().length > 0;
    if (hasText) {
        sendBtn.classList.add('has-text');
        sendBtn.title = 'Send';
    } else {
        sendBtn.classList.remove('has-text');
        sendBtn.title = 'Send';
    }
}

input.addEventListener('input', () => {
    if (input.innerText.trim() === '') {
        input.innerHTML = '';
    }
    updateSendBtn();
});

// Always opens login page on click
function handleSendClick() {
    openAuth('login');
}

async function submitUserPrompt() {
    const promptText = input.innerText.trim();
    if (!promptText) {
        statusLog.textContent = "Please describe your layout concept first.";
        return;
    }

    statusLog.textContent = "Passing description to C++ AST parsing engine via Cerebrium...";

    const structuralPayload = {
        type: "TouchableOpacity",
        content: promptText,
        style: "flex:1,backgroundColor:'#a855f7',justifyContent:'center',borderRadius:12"
    };

    try {
        const response = await fetch('https://run.cerebrium.ai/cleaninput-ai-engine/predict', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer YOUR_CEREBRIUM_JWT_TOKEN'
            },
            body: JSON.stringify({ payload: structuralPayload })
        });

        const data = await response.json();
        if (data.status === "success") {
            statusLog.innerHTML = `<span style="color:#22c55e;">Compilation Success! React Native source tree established.</span>`;
            console.log(data.react_native_source);
        } else {
            statusLog.textContent = "Compilation Failure: " + (data.error_log || data.message);
        }
    } catch (err) {
        statusLog.textContent = "Routing Failure: " + err.message;
    }
}
</script>
