<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build with AI</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    background: #0d0d12;
    background-image: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(168,85,247,0.07) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 70%, rgba(78,167,255,0.06) 0%, transparent 70%);
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size:18px 18px;
    pointer-events:none;
}

.screen{
    width:100%;
    max-width:780px;
    padding:0 24px;
    text-align:center;
    position:relative;
    z-index:1;
}

h1{
    font-family:'Sora',sans-serif;
    font-size:clamp(36px,5.5vw,68px);
    font-weight:800;
    line-height:1.13;
    letter-spacing:-.02em;
    color:#f0eeff;
    margin-bottom:22px;
}

h1 .highlight{
    background:linear-gradient(95deg,#a855f7,#4ea7ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.sub{
    font-size:clamp(16px,1.8vw,19px);
    color:#8b8aa8;
    line-height:1.65;
    max-width:560px;
    margin:0 auto 32px;
    font-weight:400;
}

/* Composer box */
.composer{
    background:#16151f;
    border-radius:20px;
    padding:18px 18px 14px;
    max-width:620px;
    margin:0 auto;
    box-shadow:0 8px 40px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.3);
    border:1px solid rgba(255,255,255,.08);
}

.composer-input{
    width:100%;
    min-height:46px;
    font-family:'Inter',sans-serif;
    font-size:16px;
    color:#e8e6ff;
    outline:none;
    line-height:1.6;
    text-align:left;
    caret-color:#a855f7;
    word-break:break-word;
}

.composer-input:empty::before{
    content:attr(data-placeholder);
    color:#44415a;
    pointer-events:none;
}

.composer-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:12px;
}

.composer-left{
    display:flex;
    gap:8px;
    align-items:center;
}

.icon-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:#1e1c2a;
    color:#9d84d4;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .15s, transform 0.1s;
    flex-shrink:0;
}

.icon-btn:hover{
    background:#2a2740;
}

.icon-btn:active {
    transform: scale(0.95);
}

.icon-btn svg{
    width:16px;
    height:16px;
}

/* Send button */
#sendBtn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
    background: #1e1c2a;
    color: #44415a;
    box-shadow: none;
}

#sendBtn svg {
    width: 16px;
    height: 16px;
    transition: color 0.18s;
}

#sendBtn.has-text {
    background: linear-gradient(135deg, #a855f7, #4ea7ff);
    color: #fff;
    box-shadow: 0 4px 14px rgba(168,85,247,.35);
}

#sendBtn.has-text:hover {
    opacity: 0.88;
    transform: scale(1.06);
}

#sendBtn:not(.has-text):hover {
    background: #2a2740;
    color: #9d84d4;
}

#sendBtn:active {
    transform: scale(0.94);
}

#statusLog {
    font-size: 12px;
    color: #a855f7;
    margin-top: 15px;
    font-weight: 500;
}

/* Header */
.site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(13,13,18,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 24px;
}

.header-inner {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo-area {
    display: flex;
    align-items: center;
    text-decoration: none;
}

.logo-name {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #f0eeff;
    letter-spacing: -0.02em;
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}

.btn-signin {
    background: linear-gradient(95deg, #a855f7, #4ea7ff);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 6px 16px;
    height: 34px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.01em;
    white-space: nowrap;
    transition: opacity 0.15s;
}
.btn-signin:hover { opacity: 0.88; }

.btn-signup {
    background: transparent;
    color: #c4c0e0;
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 7px;
    padding: 6px 16px;
    height: 34px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.01em;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
}
.btn-signup:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }

/* Logged-in user pill in header */
.btn-user {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(168,85,247,0.1);
    border: 1.5px solid rgba(168,85,247,0.25);
    border-radius: 20px;
    padding: 5px 14px 5px 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    color: #c084fc;
    transition: background 0.15s;
}
.btn-user:hover { background: rgba(168,85,247,0.18); }
.btn-user .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg,#a855f7,#4ea7ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
}
.btn-logout {
    background: transparent;
    border: none;
    color: #a855f7;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    transition: background 0.15s;
    display: none;
}
.btn-logout:hover { background: rgba(168,85,247,0.12); }

.btn-menu {
    width: 38px;
    height: 38px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5.5px;
    padding: 0;
    margin-left: 4px;
}
.btn-menu span {
    display: block;
    width: 20px;
    height: 2px;
    background: #c4c0e0;
    border-radius: 2px;
}

/* Auth Full Page */
.auth-page {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #0d0d12;
    background-image: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(168,85,247,0.07) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 70%, rgba(78,167,255,0.06) 0%, transparent 70%);
    overflow-y: auto;
    animation: pageFadeIn 0.2s ease;
}
.auth-page.active { display: block; }
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.auth-close {
    position: fixed;
    top: 16px;
    right: 20px;
    width: 36px; height: 36px;
    border: none;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #c4c0e0;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: background 0.15s;
    z-index: 201;
}
.auth-close:hover { background: rgba(255,255,255,0.12); }

.auth-inner {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 32px 40px;
    position: relative;
    z-index: 1;
}

.auth-card {
    background: transparent;
    width: 100%;
    max-width: 420px;
}

.auth-brand {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #f0eeff;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 28px;
}

.auth-title {
    font-family: 'Sora', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: #f0eeff;
    margin-bottom: 6px;
}
.auth-sub {
    font-size: 14px;
    color: #6b6885;
    margin-bottom: 28px;
    line-height: 1.5;
}

.social-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 11px 16px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #c4c0e0;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background 0.15s;
}
.social-btn:hover { background: rgba(255,255,255,0.08); }

.auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0;
    color: #3a3852;
    font-size: 13px;
}
.auth-divider::before, .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.07);
}

.field-label {
    font-size: 13px;
    font-weight: 500;
    color: #a09cc0;
    margin-bottom: 6px;
    display: block;
}
.field-wrap {
    position: relative;
    margin-bottom: 16px;
}
.field-wrap svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: #44415a;
}
.field-input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #e8e6ff;
    outline: none;
    transition: border-color 0.15s;
    background: rgba(255,255,255,0.04);
}
.field-input::placeholder { color: #3a3852; }
.field-input:focus { border-color: #a855f7; background: rgba(168,85,247,0.05); }
.field-input.error { border-color: #ef4444; }

.auth-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    font-size: 13px;
}
.remember {
    display: flex;
    align-items: center;
    gap: 7px;
    color: #8b8aa8;
    cursor: pointer;
}
.remember input[type=checkbox] {
    accent-color: #a855f7;
    width: 15px; height: 15px;
    cursor: pointer;
}
.forgot { color: #6b6885; cursor: pointer; text-decoration: none; }
.forgot:hover { color: #a855f7; }

.auth-submit {
    width: 100%;
    padding: 13px;
    background: linear-gradient(95deg, #a855f7, #4ea7ff);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: opacity 0.15s;
    margin-bottom: 18px;
}
.auth-submit:hover { opacity: 0.9; }
.auth-submit:disabled { opacity: 0.6; cursor: not-allowed; }

.auth-switch {
    text-align: center;
    font-size: 13.5px;
    color: #7a7a9a;
}
.auth-switch a {
    color: #a855f7;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
}
.auth-switch a:hover { text-decoration: underline; }

/* Auth feedback message */
.auth-msg {
    font-size: 13px;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    display: none;
}
.auth-msg.success { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); display: block; }
.auth-msg.error   { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); display: block; }

/* Image preview strip */
.img-preview-strip {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 0 12px 0;
}
.img-preview-strip.has-images {
    display: flex;
}
.img-thumb {
    position: relative;
    width: 72px;
    height: 72px;
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
    background: #1e1c2a;
}
.img-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.img-thumb .remove-img {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    font-size: 10px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s;
}
.img-thumb .remove-img:hover { background: rgba(239,68,68,0.85); }
.img-thumb .img-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.55);
    font-size: 9px;
    color: #ddd;
    padding: 2px 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
/* Upload icon button active state */
.icon-btn.upload-active {
    background: rgba(168,85,247,0.18);
    color: #c084fc;
}

</style>
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <a href="#" class="logo-area">
            <span class="logo-name">Cleainput</span>
        </a>
        <div class="header-actions">
            <!-- Shown when logged out -->
            <button class="btn-signin" id="headerSignin" onclick="openAuth('login')">Sign in</button>
            <button class="btn-signup" id="headerSignup" onclick="openAuth('signup')">Sign up</button>
            <!-- Shown when logged in -->
            <button class="btn-user" id="headerUser">
                <div class="avatar" id="headerAvatar">U</div>
                <span id="headerUsername">User</span>
            </button>
            <button class="btn-logout" id="headerLogout" onclick="logoutUser()">Log out</button>
            <button class="btn-menu" aria-label="Menu">
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</header>

<div class="screen" style="padding-top:60px;">

    <h1>
        Turn your idea into<br>
        a <span class="highlight">live product</span> today
    </h1>

    <p class="sub">
        Describe what you want to build, and watch it come to life —
        fully functional, ready to ship, no code required.
    </p>

    <div class="composer">
        <!-- Hidden file input for image uploads -->
        <input type="file" id="imgUploadInput" accept="image/*" multiple style="display:none" onchange="handleImageUpload(event)">

        <!-- Image preview strip (shown above text input when images are attached) -->
        <div class="img-preview-strip" id="imgPreviewStrip"></div>

        <div
            class="composer-input"
            contenteditable="true"
            data-placeholder="Describe the app you want to build..."
        ></div>
        <div class="composer-bar">
            <div class="composer-left">
                <!-- Cloud-arrow button now triggers image upload -->
                <button class="icon-btn" id="uploadImgBtn" title="Attach images" onclick="document.getElementById('imgUploadInput').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 16 12 12 8 16"></polyline>
                        <line x1="12" y1="12" x2="12" y2="21"></line>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                        <polyline points="16 16 12 12 8 16"></polyline>
                    </svg>
                </button>
                <span style="border:1.5px solid #c4b8e8;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:500;color:#7c5cbf;letter-spacing:.02em;display:inline-flex;align-items:center;">react native</span>
            </div>

            <button id="sendBtn" title="Send" onclick="handleSendClick()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div id="statusLog"></div>

</div>

<!-- Auth Full Page -->
<div class="auth-page" id="authPage">
  <button class="auth-close" onclick="closeAuth()">✕</button>
  <div class="auth-inner">
    <div class="auth-card">

      <!-- LOGIN VIEW -->
      <div id="loginView">
        <div class="auth-brand">Cleainput</div>

        <button class="social-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign in with Google
        </button>
        <button class="social-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Sign in with GitHub
        </button>

        <div class="auth-divider">or</div>

        <!-- ✅ VERIFIED: id="loginForm" -->
        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
          <div id="loginMsg" class="auth-msg"></div>

          <label class="field-label" for="loginEmail">Email</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <!-- ✅ VERIFIED: id="loginEmail" -->
            <input class="field-input" id="loginEmail" type="email" placeholder="Your email" required>
          </div>

          <label class="field-label" for="loginPassword">Password</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <!-- ✅ VERIFIED: id="loginPassword" -->
            <input class="field-input" id="loginPassword" type="password" placeholder="Your password" required>
          </div>

          <div class="auth-row">
            <label class="remember"><input type="checkbox" id="rememberMe" checked> Remember me</label>
            <a class="forgot">Forgot Password?</a>
          </div>

          <button class="auth-submit" type="submit" id="loginSubmitBtn">Login</button>
        </form>
        <div class="auth-switch">Don't have an account? <a onclick="switchView('signup')">Sign Up</a></div>
      </div>

      <!-- SIGNUP VIEW -->

          Sign up with Google

          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>

<!-- ─────────────────────────────────────────────
     SCRIPT 1 — Auth page navigation helpers
───────────────────────────────────────────── -->
<script>
function openAuth(view) {
    document.getElementById('authPage').classList.add('active');
    switchView(view);
}
function closeAuth() {
    document.getElementById('authPage').classList.remove('active');
}
function switchView(view) {
    document.getElementById('loginView').style.display  = view === 'login'  ? 'block' : 'none';
    document.getElementById('signupView').style.display = view === 'signup' ? 'block' : 'none';
    // Clear messages when switching
    ['loginMsg','signupMsg'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.className = 'auth-msg'; el.textContent = ''; }
    });
}
</script>

<!-- ─────────────────────────────────────────────
     SCRIPT 2 — Composer input / send button / image upload
───────────────────────────────────────────── -->
<script>
const input          = document.querySelector('.composer-input');
const statusLog      = document.getElementById('statusLog');
const sendBtn        = document.getElementById('sendBtn');
const imgPreviewStrip = document.getElementById('imgPreviewStrip');
const uploadImgBtn   = document.getElementById('uploadImgBtn');

// Track uploaded image files
let uploadedImages = []; // Array of { file, dataUrl, id }
let imgIdCounter   = 0;

// ── Send button state ─────────────────────────
function updateSendBtn() {
    const hasContent = input.innerText.trim().length > 0 || uploadedImages.length > 0;
    sendBtn.classList.toggle('has-text', hasContent);
}

input.addEventListener('input', () => {
    if (input.innerText.trim() === '') input.innerHTML = '';
    updateSendBtn();
});

// Also allow paste of images directly into the composer
input.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    const imageItems = Array.from(items).filter(i => i.type.startsWith('image/'));
    if (imageItems.length === 0) return;
    e.preventDefault();
    imageItems.forEach(item => {
        const file = item.getAsFile();
        if (file) addImageFile(file);
    });
});

// ── Image upload handler ──────────────────────
function handleImageUpload(event) {
    const files = Array.from(event.target.files);
    files.forEach(file => addImageFile(file));
    // Reset input so same file can be re-selected
    event.target.value = '';
}

function addImageFile(file) {
    const id = ++imgIdCounter;
    const reader = new FileReader();
    reader.onload = (e) => {
        const dataUrl = e.target.result;
        uploadedImages.push({ file, dataUrl, id });
        renderPreviews();
        updateSendBtn();
    };
    reader.readAsDataURL(file);
}

function removeImage(id) {
    uploadedImages = uploadedImages.filter(img => img.id !== id);
    renderPreviews();
    updateSendBtn();
}

function renderPreviews() {
    imgPreviewStrip.innerHTML = '';
    if (uploadedImages.length === 0) {
        imgPreviewStrip.classList.remove('has-images');
        uploadImgBtn.classList.remove('upload-active');
        return;
    }

    imgPreviewStrip.classList.add('has-images');
    uploadImgBtn.classList.add('upload-active');

    uploadedImages.forEach(({ dataUrl, file, id }) => {
        const thumb = document.createElement('div');
        thumb.className = 'img-thumb';
        thumb.innerHTML = `
            <img src="${dataUrl}" alt="${file.name}">
            <button class="remove-img" onclick="removeImage(${id})" title="Remove">
                <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
                </svg>
            </button>
            <div class="img-name">${file.name}</div>
        `;
        imgPreviewStrip.appendChild(thumb);
    });
}

// ── Drag-and-drop onto the composer ──────────
const composerEl = document.querySelector('.composer');
composerEl.addEventListener('dragover', (e) => {
    e.preventDefault();
    composerEl.style.borderColor = 'rgba(168,85,247,0.5)';
});
composerEl.addEventListener('dragleave', () => {
    composerEl.style.borderColor = '';
});
composerEl.addEventListener('drop', (e) => {
    e.preventDefault();
    composerEl.style.borderColor = '';
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    files.forEach(f => addImageFile(f));
});

// ── Send / Auth gate ──────────────────────────
function handleSendClick() {
    const session = loadSession();
    if (session) {
        submitUserPrompt(); // Fire request directly if logged in
    } else {
        openAuth('login');  // Open modal only if unauthenticated
    }
}

// ── Submit with validation (rule preserved) ───
async function submitUserPrompt() {
    const promptText = input.innerText.trim();

    // ✅ Rule preserved: text is always required regardless of images
    if (!promptText) {
        statusLog.textContent = "Please describe your layout concept first.";
        return;
    }

    // Session check: must be signed in with a valid token
    const session = loadSession();
    if (!session || !session.token) {
        statusLog.textContent = "Please sign in to submit your project.";
        openAuth('login');
        return;
    }

    statusLog.textContent = "Sending to Cleainput engine...";

    const payload = {
        prompt: promptText,
        images: uploadedImages.map(img => ({ name: img.file.name, data: img.dataUrl }))
    };

    try {
        const response = await fetch(`${CF_WORKER_URL}/build`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${session.token}`
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (data.success) {
            statusLog.innerHTML = `<span style="color:#22c55e;">Build queued successfully!</span>`;
        } else {
            statusLog.textContent = "Error: " + (data.error || "Something went wrong.");
        }
    } catch (err) {
        statusLog.textContent = "Request failed: " + err.message;
    }
}
</script>

<!-- ─────────────────────────────────────────────
     SCRIPT 3 — Auth logic: Cloudflare Workers/D1
     + session management (placed before </body>)
───────────────────────────────────────────── -->
<script>
// ── CONFIG ──────────────────────────────────────
// Replace with your deployed Cloudflare Worker URL
const CF_WORKER_URL = 'https://cleainput.officialmykeee.workers.dev';

// Session key stored in sessionStorage (tab-scoped)
// Falls back to localStorage when "Remember me" is ticked
const SESSION_KEY = 'cleainput_session';

// ── UTILITY HELPERS ──────────────────────────────
function showMsg(id, text, type /* 'success' | 'error' */) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className   = 'auth-msg ' + type;
}

function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading
        ? (btnId === 'loginSubmitBtn' ? 'Signing in…' : 'Creating account…')
        : (btnId === 'loginSubmitBtn' ? 'Login'        : 'Create Account');
}

// ── SESSION MANAGEMENT ────────────────────────────
/**
 * Save session after successful login / signup.
 * Uses localStorage when "Remember me" is checked,
 * otherwise sessionStorage (clears on tab close).
 */
function saveSession(userData, remember) {
    const payload = JSON.stringify(userData);
    if (remember) {
        localStorage.setItem(SESSION_KEY, payload);
    } else {
        sessionStorage.setItem(SESSION_KEY, payload);
        localStorage.removeItem(SESSION_KEY); // clear any old persistent session
    }
}

function loadSession() {
    const raw = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
    try { return raw ? JSON.parse(raw) : null; } catch { return null; }
}

function clearSession() {
    localStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(SESSION_KEY);
}

// ── HEADER UI UPDATE ──────────────────────────────
function updateHeaderUI(session) {
    const signinBtn  = document.getElementById('headerSignin');
    const signupBtn  = document.getElementById('headerSignup');
    const userBtn    = document.getElementById('headerUser');
    const logoutBtn  = document.getElementById('headerLogout');
    const usernameEl = document.getElementById('headerUsername');
    const avatarEl   = document.getElementById('headerAvatar');

    if (session) {
        // Logged in
        signinBtn.style.display  = 'none';
        signupBtn.style.display  = 'none';
        userBtn.style.display    = 'flex';
        logoutBtn.style.display  = 'inline-flex';
        usernameEl.textContent   = session.username || session.email.split('@')[0];
        avatarEl.textContent     = (session.username || session.email)[0].toUpperCase();
    } else {
        // Logged out
        signinBtn.style.display  = '';
        signupBtn.style.display  = '';
        userBtn.style.display    = 'none';
        logoutBtn.style.display  = 'none';
    }
}

// ── LOGOUT ────────────────────────────────────────
function logoutUser() {
    clearSession();
    updateHeaderUI(null);
}

// ── SIGNUP ────────────────────────────────────────
async function handleSignup(event) {
    event.preventDefault();

    const username = document.getElementById('signupUsername').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!username) return showMsg('signupMsg', 'Full name is required.', 'error');
    if (!email || !/\S+@\S+\.\S+/.test(email)) return showMsg('signupMsg', 'Enter a valid email address.', 'error');
    if (password.length < 8) return showMsg('signupMsg', 'Password must be at least 8 characters.', 'error');

    setLoading('signupSubmitBtn', true);
    showMsg('signupMsg', '', '');

    try {
        const res = await fetch(`${CF_WORKER_URL}/auth/signup`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, email, password })
        });

        const data = res.ok ? await res.json() : null;

        if (res.ok && data && data.success) {
            // FIXED: Appended profile_id to match D1 structure
            saveSession({
                profile_id: data.profile_id,
                username: data.username || username,
                email,
                token: data.token
            }, false);

            updateHeaderUI({ username: data.username || username, email });
            showMsg('signupMsg', 'Account created! Loading your workspace... 🎉', 'success');

            // FIXED: Redirect to prompt workspace instead of closing popup
            setTimeout(() => { window.location.href = 'prompt.html'; }, 1000);
        } else {
            showMsg('signupMsg', (data && data.error) || 'Sign-up failed. Please try again.', 'error');
        }
    } catch (err) {
        showMsg('signupMsg', 'Network error — please check your connection.', 'error');
        console.error('[signup]', err);
    } finally {
        setLoading('signupSubmitBtn', false);
    }
}

// ── LOGIN ─────────────────────────────────────────
async function handleLogin(event) {
    event.preventDefault();

    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const remember = document.getElementById('rememberMe').checked;

    if (!email || !/\S+@\S+\.\S+/.test(email)) return showMsg('loginMsg', 'Enter a valid email address.', 'error');
    if (!password) return showMsg('loginMsg', 'Password is required.', 'error');

    setLoading('loginSubmitBtn', true);
    showMsg('loginMsg', '', '');

    try {
        const res = await fetch(`${CF_WORKER_URL}/auth/login`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email, password })
        });

        const data = res.ok ? await res.json() : null;

        if (res.ok && data && data.success) {
            // FIXED: Captured unique D1 profile_id for Hugging Face mapping
            saveSession({
                profile_id: data.profile_id,
                username: data.username || email.split('@')[0],
                email,
                token: data.token
            }, remember);

            updateHeaderUI({ username: data.username || email.split('@')[0], email });
            showMsg('loginMsg', 'Welcome back! Opening workspace... 👋', 'success');

            // FIXED: Redirect straight to prompt page with active session
            setTimeout(() => { window.location.href = 'prompt.html'; }, 1000);
        } else {
            showMsg('loginMsg', (data && data.error) || 'Incorrect email or password.', 'error');
        }
    } catch (err) {
        showMsg('loginMsg', 'Network error — please check your connection.', 'error');
        console.error('[login]', err);
    } finally {
        setLoading('loginSubmitBtn', false);
    }
}

// ── INIT: restore session on page load ───────────
(function init() {
    const session = loadSession();
    if (session) updateHeaderUI(session);
})();
</script>
