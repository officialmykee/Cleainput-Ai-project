[cerebrium.deployment]
name = "cleaninput-ai-engine"
python_version = "3.11"

[cerebrium.hardware]
compute = "CPU"
cpu = 2
memory = 4.0

[cerebrium.dependencies.pip]
torch = ">=2.0.0"
torchvision = ">=0.15.0"
pillow = ">=9.0.0"
pydantic = ">=2.0.0"

[cerebrium.dependencies.apt]
build-essential = "latest"
cmake = "latest"
g++ = "latest"
ca-certificates = "latest"
default-jre = "latest"
zip = "latest"
unzip = "latest"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 500
idle_timeout = 10

