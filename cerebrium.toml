[project]
name = "cleaninput-ai-engine"
version = "0.1.0"

[hardware]
# Using highly optimized CPU/Lightweight instances for the asset injection 
# to keep GPU concurrency strictly reserved for the LLM matrix operations.
compute_type = "cpu" 
cpu_count = 1
memory = "2Gi"

[runtime]
# We use a minimal linux base to avoid bloat and keep container startup times under 200ms
provider = "linux"
base_image = "ubuntu:22.04"

[dependencies]
# Standard C++ build tools needed to compile our source code on deployment
apt = [
    "build-essential",
    "cmake",
    "g++"
]

[scaling]
# Extreme discipline constraints to maximize your 500-container limit
min_replicas = 0
max_replicas = 500
# Aggressive scale down: if a container is idle for 5 seconds, kill it immediately
idle_timeout = 5 

[logging]
# Strict 1-day retention limit configuration
retention_days = 1

