[project]
name = "cleaninput-ai-engine"
version = "0.1.0"
entrypoint = "main:predict"

[hardware]
region = "us-east-1"
device = "cpu"
cpu = 2
memory = 4.0

[dependencies.pip]
torch = ">=2.0.0"
torchvision = ">=0.15.0"
pillow = ">=9.0.0"
pydantic = ">=2.0.0"

[dependencies.apt]
build-essential = "latest"
cmake = "latest"
g++ = "latest"
ca-certificates = "latest"
default-jre = "latest"
zip = "latest"
unzip = "latest"

[scaling]
min_replicas = 0
max_replicas = 500
cooldown = 10

