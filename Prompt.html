}

.composer-bar {
    display: -webkit-box;
    display: -ms-flexbox;

    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-box-pack: justify;

}

.composer-left {

}

.icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #1a1a1a;
    color: #888;
    display: -webkit-inline-box;
    display: -ms-inline-flexbox;
    display: inline-flex;
    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-box-pack: center;
    -ms-flex-pack: center;
    justify-content: center;
    cursor: pointer;
    -webkit-transition: background .15s, -webkit-transform 0.1s;
    transition: background .15s, transform 0.1s;
    -ms-flex-negative: 0;
    flex-shrink: 0;
    -webkit-appearance: none;
    appearance: none;
    position: relative;
}

.icon-btn:hover { background: #222; color: #bbb; }
.icon-btn:active { -webkit-transform: scale(0.95); transform: scale(0.95); }
.icon-btn svg { width: 16px; height: 16px; }

/* Send button active state */
.icon-btn.send-active {
    background: #fff;
    color: #000;
}
.icon-btn.send-active:hover { background: #e0e0e0; color: #000; }

/* Icon swap transition */
.icon-btn .icon-mic,
.icon-btn .icon-send {
    position: absolute;
    -webkit-transition: opacity 0.18s, -webkit-transform 0.18s;
    transition: opacity 0.18s, transform 0.18s;
}

.icon-btn .icon-send {
    opacity: 0;
    -webkit-transform: scale(0.6) translateY(4px);
    transform: scale(0.6) translateY(4px);
}
.icon-btn .icon-mic {
    opacity: 1;
    -webkit-transform: scale(1) translateY(0);
    transform: scale(1) translateY(0);
}
.icon-btn.send-active .icon-mic {
    opacity: 0;
    -webkit-transform: scale(0.6) translateY(-4px);
    transform: scale(0.6) translateY(-4px);
}
.icon-btn.send-active .icon-send {
    opacity: 1;
    -webkit-transform: scale(1) translateY(0);
    transform: scale(1) translateY(0);
}

.badge {

/* "Analyzing" pill */
.thinking-label {
    display: -webkit-inline-box;
    display: -ms-inline-flexbox;
    display: inline-flex;
    -webkit-box-align: center;
    -ms-flex-align: center;

.thinking-dots {

    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
}

.thinking-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #444;
    display: inline-block;
    -webkit-animation: dotPulse 1.4s ease-in-out infinite;
    animation: dotPulse 1.4s ease-in-out infinite;
}

.thinking-dots span:nth-child(2) {
    -webkit-animation-delay: 0.2s;
    animation-delay: 0.2s;
}
.thinking-dots span:nth-child(3) {
    -webkit-animation-delay: 0.4s;
    animation-delay: 0.4s;
}

@-webkit-keyframes dotPulse {
    0%, 60%, 100% { opacity: 0.2; -webkit-transform: scale(1); transform: scale(1); }
    30%            { opacity: 1;   -webkit-transform: scale(1.35); transform: scale(1.35); }
}
@keyframes dotPulse {
    0%, 60%, 100% { opacity: 0.2; -webkit-transform: scale(1); transform: scale(1); }
    30%            { opacity: 1;   -webkit-transform: scale(1.35); transform: scale(1.35); }
}

/* Shimmering thought lines */
.thought-lines {
    display: -webkit-box;
    display: -ms-flexbox;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -ms-flex-direction: column;
    flex-direction: column;

}

.thought-line {
    height: 9px;
    border-radius: 6px;
    background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    -webkit-animation: shimmer 1.8s ease-in-out infinite;
    animation: shimmer 1.8s ease-in-out infinite;
}

.thought-line:nth-child(1) { width: 88%; -webkit-animation-delay: 0s; animation-delay: 0s; }
.thought-line:nth-child(2) { width: 72%; -webkit-animation-delay: 0.15s; animation-delay: 0.15s; }
.thought-line:nth-child(3) { width: 80%; -webkit-animation-delay: 0.3s; animation-delay: 0.3s; }
.thought-line:nth-child(4) { width: 55%; -webkit-animation-delay: 0.45s; animation-delay: 0.45s; }

@-webkit-keyframes shimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
}
@keyframes shimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }

<body>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
    <div class="drawer-header">
        <span class="drawer-title">Projects</span>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-search-row">
        <div class="drawer-search-box">
            <div class="drawer-search-input" contenteditable="true" data-placeholder="Search projects..."></div>
        </div>
    </div>
    <div class="drawer-body" id="projectList">
        <div class="drawer-new-project" onclick="newProject()">
            <div class="drawer-new-icon">+</div>
            <span class="drawer-new-label">Create new project</span>
        </div>
    </div>
    <div class="drawer-footer">
        <div class="drawer-avatar">M</div>
        <span class="drawer-username">My Cleaninput</span>
    </div>
</div>

<div class="tab-header">
    <div class="tab-toprow">
        <button class="hamburger-btn" id="hamburgerBtn" onclick="openDrawer()">
            <span></span><span></span><span></span>
        </button>
        <div class="coin-credit">
            <span class="coin-icon"><span class="coin-disc"></span></span>
            <span class="coin-count">10</span>
        </div>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(this, 'chat')">Chat</button>
        <button class="tab-btn" onclick="switchTab(this, 'preview')">Preview</button>
    </div>
</div>

<div class="chat-thread" id="chatThread"></div>

<div class="composer-wrapper">
    <div class="composer">
        <input type="file" id="imageAttachmentInput" accept="image/*" style="display:none;" onchange="handleImageSelected(this)">
        
        <div class="composer-input" contenteditable="true" data-placeholder="Describe the app you want to build..."></div>
        
        <div id="attachmentArea"></div>

        <div class="composer-bar">
            <div class="composer-left">
                <button class="icon-btn" title="Attach Blueprint Matrix" onclick="document.getElementById('imageAttachmentInput').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 16 12 12 8 16"></polyline>
                        <line x1="12" y1="12" x2="12" y2="21"></line>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                    </svg>
                </button>
                <span class="badge">react native</span>
            </div>
            <button class="icon-btn" id="micSendBtn" title="Send Payload" onclick="handleMicSend()">
                <svg class="icon-mic" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9.75 7.75C9.75 7.33579 9.41421 7 9 7H7.81597H6.29847C6.66598 4.17873 9.07855 2 12 2C14.9214 2 17.334 4.17873 17.7015 7H16.184L13.5 7C13.0858 7 12.75 7.33579 12.75 7.75C12.75 8.16421 13.0858 8.5 13.5 8.5L16.25 8.5H17.75V10H16.25H13.5C13.0858 10 12.75 10.3358 12.75 10.75C12.75 11.1642 13.0858 11.5 13.5 11.5H16.184H17.7015C17.334 14.3213 14.9214 16.5 12 16.5C9.07855 16.5 6.66598 14.3213 6.29847 11.5H7.81597H9C9.41421 11.5 9.75 11.1642 9.75 10.75C9.75 10.3358 9.41421 10 9 10H7.75H6.25V8.5H7.75H9C9.41421 8.5 9.75 8.16421 9.75 7.75Z" fill="currentColor"/><path fill-rule="evenodd" clip-rule="evenodd" d="M4 9C4.41421 9 4.75 9.33579 4.75 9.75V10.75C4.75 14.7541 7.99594 18 12 18C16.0041 18 19.25 14.7541 19.25 10.75V9.75C19.25 9.33579 19.5858 9 20 9C20.4142 9 20.75 9.33579 20.75 9.75V10.75C20.75 15.3298 17.2314 19.0879 12.75 19.4683V21.75C12.75 22.1642 12.4142 22.5 12 22.5C11.5858 22.5 11.25 22.1642 11.25 21.75V19.4683C6.7686 19.0879 3.25 15.3298 3.25 10.75V9.75C3.25 9.33579 3.58579 9 4 9Z" fill="currentColor"/></svg>
                <svg class="icon-send" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
        </div>
    </div>
</div>

<script>
var base64ImageData = null;

function handleImageSelected(inputElement) {
    const file = inputElement.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        base64ImageData = e.target.result;
        document.getElementById('attachmentArea').innerHTML = `
            <div class="upload-preview-badge">
                <span>📎 ${file.name}</span>
                <div class="close-upload" onclick="clearAttachedImage()">✕</div>
            </div>
        `;
        updateSendBtn();
    };
    reader.readAsDataURL(file);
}

function clearAttachedImage() {
    base64ImageData = null;
    document.getElementById('imageAttachmentInput').value = "";
    document.getElementById('attachmentArea').innerHTML = "";
    updateSendBtn();
}

function switchTab(btn, tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
}

function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }

var input = document.querySelector('.composer-input');
var micSendBtn = document.getElementById('micSendBtn');

function updateSendBtn() {
    var hasText = input.innerText.trim().length > 0 || base64ImageData !== null;
    if (hasText) {
        micSendBtn.classList.add('send-active');
    } else {
        micSendBtn.classList.remove('send-active');
    }
}

function handleMicSend() {
    if (input.innerText.trim().length > 0 || base64ImageData !== null) {
        submitUserPrompt();
    }
}

input.addEventListener('input', function() {
    if (input.innerText.trim() === '') input.innerHTML = '';
    updateSendBtn();
});

input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitUserPrompt();
    }
});

async function submitUserPrompt() {
    var promptText = input.innerText.trim();
    if (!promptText && !base64ImageData) return;

    var thread = document.getElementById('chatThread');

    // Append user layout block inside workspace view
    var userRow = document.createElement('div');
    userRow.className = 'bubble-row user';
    let messageContent = escapeHtml(promptText || "Analyzing uploaded asset frame blueprint...");
    if (base64ImageData) {
        messageContent = `<div>📸 [Attached UI Mockup Image]</div>` + messageContent;
    }
    userRow.innerHTML = '<div class="bubble user">' + messageContent + '</div>';
    thread.appendChild(userRow);

    // Establish Shimmer Processing Node
    var aiRow = document.createElement('div');
    aiRow.className = 'bubble-row ai';
    aiRow.id = "activeThinkingBlock";
    aiRow.innerHTML = `
        <div class="ai-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
        </div>
        <div class="thinking-block">
            <div class="thinking-label" id="activeThinkingLabel">
                Cleaninput is building your mobile app bundles
                <span class="thinking-dots"><span></span><span></span><span></span></span>
            </div>
            <div class="thought-lines">
                <div class="thought-line"></div>
                <div class="thought-line"></div>
            </div>
        </div>
    `;
    thread.appendChild(aiRow);
    thread.scrollTop = thread.scrollHeight;

    input.innerHTML = '';
    const capturedImage = base64ImageData;
    clearAttachedImage();

    try {
        const response = await fetch('https://run.cerebrium.ai/cleaninput-ai-engine/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer YOUR_CEREBRIUM_JWT_TOKEN' },
            body: JSON.stringify({
                payload: {
                    prompt: promptText,
                    image_data: capturedImage
                }
            })
        });

        const data = await response.json();

        if (data.status === "success") {
            document.getElementById('activeThinkingBlock').removeAttribute('id');
            var successRow = document.createElement('div');
            successRow.className = 'bubble-row ai';
            successRow.innerHTML = `
                <div class="ai-avatar">✨</div>
                <div class="bubble" style="background:#09090b; border:1px solid #22c55e; color:#22c55e;">
                    <strong>AAB compilation complete!</strong> Your Android App Bundle package is established and ready to deploy to Google Play.
                </div>
            `;
            thread.appendChild(successRow);
        } else {
            showErrorInPlace();
        }
    } catch (err) {
        showErrorInPlace();
    }
    thread.scrollTop = thread.scrollHeight;
}

function showErrorInPlace() {
    var label = document.getElementById('activeThinkingLabel');
    if (label) {
        label.innerHTML = `Failed to Fetch`;
    }
    var block = document.getElementById('activeThinkingBlock');
    if (block) block.removeAttribute('id');
}

function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
