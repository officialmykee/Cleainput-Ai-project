<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaninput</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; min-height: 100%; font-family: 'Inter', sans-serif; background: #000; }
body { display: flex; flex-direction: column; justify-content: space-between; align-items: center; }

/* Drawer overlay */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(2px); }
.drawer-overlay.open { opacity: 1; pointer-events: auto; }

/* Drawer */
.drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 72%; max-width: 280px; background: #0d0d0d; border-right: 1px solid rgba(255,255,255,.07); z-index: 201; transform: translateX(-100%); transition: transform .28s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
.drawer.open { transform: translateX(0); }
.drawer-header { padding: 52px 0 4px; }

/* Nav */
.drawer-nav { padding: 0 8px; display: flex; flex-direction: column; gap: 1px; }
.nav-item { display: flex; align-items: center; gap: 14px; padding: 11px 12px; border-radius: 10px; cursor: pointer; transition: background .12s; color: #bbb; font-size: 14px; font-weight: 450; letter-spacing: .01em; border: none; background: transparent; width: 100%; text-align: left; appearance: none; }
.nav-item:hover { background: rgba(255,255,255,.05); color: #fff; }
.nav-item:hover .nav-icon { color: #ddd; }
.nav-icon { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: #777; transition: color .12s; }
.nav-icon svg { width: 18px; height: 18px; }

/* Section headers */
.drawer-section-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 12px 5px; }
.drawer-section-label { font-size: 11px; font-weight: 600; color: #444; letter-spacing: .07em; text-transform: uppercase; }
.section-action-btn { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; color: #555; cursor: pointer; border-radius: 6px; transition: background .12s, color .12s; appearance: none; }
.section-action-btn:hover { background: rgba(255,255,255,.07); color: #aaa; }
.section-action-btn svg { width: 13px; height: 13px; }

/* Body */
.drawer-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

/* Task rows */
.drawer-task-item { display: flex; align-items: center; gap: 11px; padding: 9px 12px; margin: 0 8px; border-radius: 10px; cursor: pointer; transition: background .12s; position: relative; }
.drawer-task-item:hover { background: rgba(255,255,255,.05); }
.drawer-task-icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: #555; }
.drawer-task-icon svg { width: 16px; height: 16px; }
.drawer-task-label { flex: 1; font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drawer-task-more { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; color: #444; border: none; background: transparent; cursor: pointer; border-radius: 6px; transition: background .12s, color .12s; appearance: none; opacity: 0; flex-shrink: 0; }
.drawer-task-item:hover .drawer-task-more { opacity: 1; color: #777; }
.drawer-task-more:hover { background: rgba(255,255,255,.08); color: #aaa !important; }
.drawer-task-more svg { width: 14px; height: 14px; }

/* Context menu */
.ctx-menu {
    position: fixed;
    background: #161616;
    border-radius: 14px;
    padding: 6px;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 2px 8px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,.08);
    z-index: 500;
    opacity: 0;
    transform: scale(0.92);
    transform-origin: top left;
    pointer-events: none;
    transition: opacity .14s ease, transform .14s ease;
}
.ctx-menu.open { opacity: 1; transform: scale(1); pointer-events: auto; }
.ctx-menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 14px; font-weight: 450; color: #e8e8e8;
    transition: background .1s;
    border: none; background: transparent; width: 100%; text-align: left; appearance: none;
}
.ctx-menu-item:hover { background: rgba(255,255,255,.06); }
.ctx-menu-item.danger { color: #f87171; }
.ctx-menu-item.danger:hover { background: rgba(248,113,113,.08); }
.ctx-menu-divider { height: 1px; background: rgba(255,255,255,.07); margin: 4px 0; }
.ctx-icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ctx-icon svg { width: 16px; height: 16px; }

/* Footer */
.drawer-footer { padding: 12px 16px 22px; border-top: 1px solid rgba(255,255,255,.05); display: flex; align-items: center; gap: 10px; }
.drawer-avatar { width: 34px; height: 34px; border-radius: 50%; background: #6d28d9; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
.drawer-username { flex: 1; font-size: 13px; font-weight: 500; color: #aaa; }

/* Tab header */
.tab-header { position: sticky; top: 0; left: 0; right: 0; width: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; padding: 10px 24px 0; background: linear-gradient(to top, rgba(0,0,0,0) 0%, #000 60%); gap: 8px; }
.tab-toprow { width: 100%; max-width: 620px; display: flex; justify-content: space-between; align-items: center; }
.hamburger-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,.07); background: #111; color: #aaa; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; transition: background .15s; appearance: none; flex-shrink: 0; }
.hamburger-btn:hover { background: #1a1a1a; }
.hamburger-btn span { display: block; width: 14px; height: 1.5px; background: #aaa; border-radius: 2px; }
.coin-credit { display: inline-flex; align-items: center; gap: 6px; background: #111; border: 1px solid rgba(255,255,255,.07); border-radius: 999px; padding: 5px 13px 5px 7px; }
.coin-icon { position: relative; width: 22px; height: 22px; perspective: 400px; }
.coin-disc { position: absolute; inset: 0; border-radius: 50%; background: linear-gradient(145deg, #ffffff 0%, #c0c0c0 60%, #e8e8e8 100%); animation: coinFlip 2.4s ease-in-out infinite; }
@keyframes coinFlip { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
.coin-count { font-size: 13px; font-weight: 600; color: #fff; }
.tab-bar { display: flex; width: 100%; max-width: 620px; background: #111; border-radius: 12px; border: 1px solid rgba(255,255,255,.07); padding: 4px; gap: 4px; }
.tab-btn { flex: 1; padding: 9px 0; border: none; border-radius: 9px; background: transparent; color: #555; font-size: 14px; font-weight: 500; cursor: pointer; }
.tab-btn.active { background: #222; color: #fff; }

/* Chat */
.chat-thread { flex: 1; width: 100%; max-width: 620px; padding: 16px 24px 8px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.bubble-row.user { display: flex; justify-content: flex-end; }
.bubble { max-width: 72%; padding: 11px 16px; border-radius: 18px; font-size: 14px; line-height: 1.55; font-weight: 400; }
.bubble.user { background: #1e1e1e; color: #fff; border: 1px solid rgba(255,255,255,.07); }
.bubble-row.ai { display: flex; align-items: flex-start; gap: 10px; }
.ai-avatar { width: 28px; height: 28px; border-radius: 50%; background: #111; border: 1px solid rgba(255,255,255,.1); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.ai-avatar svg { width: 14px; height: 14px; opacity: 0.6; }
.thinking-block { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; width: 100%; }
.thinking-label { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: #555; font-weight: 500; letter-spacing: .02em; }
.thinking-dots { display: inline-flex; gap: 4px; align-items: center; }
.thinking-dots span { width: 5px; height: 5px; border-radius: 50%; background: #444; display: inline-block; animation: dotPulse 1.4s ease-in-out infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%, 60%, 100% { opacity: 0.2; transform: scale(1); } 30% { opacity: 1; transform: scale(1.35); } }
.thought-lines { display: flex; flex-direction: column; gap: 7px; }
.thought-line { height: 9px; border-radius: 6px; background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.8s ease-in-out infinite; }
.thought-line:nth-child(1) { width: 88%; } .thought-line:nth-child(2) { width: 72%; animation-delay: 0.15s; }
@keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }

/* Composer */
.composer-wrapper { position: sticky; bottom: 0; left: 0; right: 0; width: 100%; padding: 0 0 20px; display: flex; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.96) 30%, #000 100%); z-index: 100; }
.composer { background: #0a0a0a; border-radius: 20px; padding: 18px 18px 14px; width: 100%; max-width: 620px; margin: 0 24px; box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 2px 8px rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.08); }
.composer-input { width: 100%; min-height: 46px; font-family: 'Inter', sans-serif; font-size: 16px; color: #fff; outline: none; line-height: 1.6; caret-color: #a855f7; word-break: break-word; }
.composer-input:empty::before { content: attr(data-placeholder); color: #555; pointer-events: none; }

/* Typewriter placeholder */
.composer-input.tw-active:empty::before {
    content: attr(data-tw);
    color: #555;
    pointer-events: none;
    border-right: 2px solid #a855f7;
    animation: twCaret 0.7s step-end infinite;
    padding-right: 2px;
}
@keyframes twCaret {
    0%, 100% { border-color: #a855f7; }
    50% { border-color: transparent; }
}
.composer-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.composer-left { display: flex; gap: 8px; align-items: center; }
.icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #1a1a1a; color: #888; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s, transform 0.1s; flex-shrink: 0; appearance: none; position: relative; }
.icon-btn:hover { background: #222; color: #bbb; }
.icon-btn:active { transform: scale(0.95); }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn.send-active { background: #fff; color: #000; }
.icon-btn.send-active:hover { background: #e0e0e0; color: #000; }
.icon-btn .icon-mic, .icon-btn .icon-send { position: absolute; transition: opacity 0.18s, transform 0.18s; }
.icon-btn .icon-send { opacity: 0; transform: scale(0.6) translateY(4px); }
.icon-btn .icon-mic { opacity: 1; transform: scale(1) translateY(0); }
.icon-btn.send-active .icon-mic { opacity: 0; transform: scale(0.6) translateY(-4px); }
.icon-btn.send-active .icon-send { opacity: 1; transform: scale(1) translateY(0); }
.badge { border: 1.5px solid #2a2a2a; border-radius: 999px; padding: 5px 14px; font-size: 12px; font-weight: 500; color: #555; letter-spacing: .02em; display: inline-flex; align-items: center; }
.upload-preview-badge { display: inline-flex; align-items: center; background: #1c1917; border: 1px solid #78716c; border-radius: 8px; padding: 4px 8px; margin-top: 8px; font-size: 12px; color: #e7e5e4; gap: 6px; }
.upload-preview-badge span { max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upload-preview-badge .close-upload { cursor: pointer; color: #ef4444; font-weight: bold; }
</style>
</head>

<script>
var base64ImageData = null;
var activeCtxTarget = null;

// Context menu
function openCtxMenu(e, targetId) {
    e.stopPropagation();
    activeCtxTarget = targetId;
    var menu = document.getElementById('ctxMenu');
    var btn = e.currentTarget;
    var rect = btn.getBoundingClientRect();

    // Position near the button, offset left so it doesn't clip
    var menuW = 170;
    var left = rect.left - menuW + rect.width;
    var top = rect.bottom + 6;

    // Keep within viewport
    if (left < 8) left = 8;
    if (top + 120 > window.innerHeight) top = rect.top - 120;

    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
    menu.classList.add('open');
}

function closeCtxMenu() {
    document.getElementById('ctxMenu').classList.remove('open');
    activeCtxTarget = null;
}

function ctxAction(action) {
    if (action === 'delete' && activeCtxTarget) {
        var el = document.getElementById(activeCtxTarget);
        if (el) {
            el.style.transition = 'opacity .2s';
            el.style.opacity = '0';
            setTimeout(function() { el.remove(); }, 200);
        }
    }
    closeCtxMenu();
}

document.addEventListener('click', function(e) {
    if (!document.getElementById('ctxMenu').contains(e.target)) {
        closeCtxMenu();
    }
});

// Image attachment
function handleImageSelected(inputElement) {
    var file = inputElement.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        base64ImageData = e.target.result;
        document.getElementById('attachmentArea').innerHTML =
            '<div class="upload-preview-badge"><span>📎 ' + file.name + '</span><div class="close-upload" onclick="clearAttachedImage()">✕</div></div>';
        updateSendBtn();
    };
    reader.readAsDataURL(file);
}

function clearAttachedImage() {
    base64ImageData = null;
    document.getElementById('imageAttachmentInput').value = "";
    document.getElementById('attachmentArea').innerHTML = "";
    updateSendBtn();
}

function switchTab(btn, tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
}

function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
}

var input = document.querySelector('.composer-input');
var micSendBtn = document.getElementById('micSendBtn');

function updateSendBtn() {
    micSendBtn.classList.toggle('send-active', input.innerText.trim().length > 0 || base64ImageData !== null);
}

function handleMicSend() {
    if (input.innerText.trim().length > 0 || base64ImageData !== null) submitUserPrompt();
}

input.addEventListener('input', function() {
    if (input.innerText.trim() === '') input.innerHTML = '';
    updateSendBtn();
});
input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitUserPrompt(); }
});

async function submitUserPrompt() {
    var promptText = input.innerText.trim();
    if (!promptText && !base64ImageData) return;
    var thread = document.getElementById('chatThread');

    var userRow = document.createElement('div');
    userRow.className = 'bubble-row user';
    var msg = escapeHtml(promptText || "Analyzing uploaded asset...");
    if (base64ImageData) msg = '<div>📸 [Attached Image]</div>' + msg;
    userRow.innerHTML = '<div class="bubble user">' + msg + '</div>';
    thread.appendChild(userRow);

    var aiRow = document.createElement('div');
    aiRow.className = 'bubble-row ai';
    aiRow.id = 'activeThinkingBlock';
    aiRow.innerHTML = '<div class="ai-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div><div class="thinking-block"><div class="thinking-label" id="activeThinkingLabel">Cleaninput is building your mobile app <span class="thinking-dots"><span></span><span></span><span></span></span></div><div class="thought-lines"><div class="thought-line"></div><div class="thought-line"></div></div></div>';
    thread.appendChild(aiRow);
    thread.scrollTop = thread.scrollHeight;

    input.innerHTML = '';
    clearAttachedImage();

    setTimeout(function() {
        var block = document.getElementById('activeThinkingBlock');
        if (block) block.removeAttribute('id');
        var successRow = document.createElement('div');
        successRow.className = 'bubble-row ai';
        successRow.innerHTML = '<div class="ai-avatar" style="font-size:14px;">✨</div><div class="bubble" style="background:#09090b;border:1px solid #22c55e;color:#22c55e;max-width:80%;"><strong>Build complete!</strong> Connect your Cerebrium endpoint to generate real app bundles.</div>';
        thread.appendChild(successRow);
        thread.scrollTop = thread.scrollHeight;
    }, 2000);
}

// Typewriter placeholder
(function() {
    var phrases = [
        "Describe the app you want to build...",
        "Build a fitness tracker app...",
        "Create a recipe sharing app...",
        "Make a habit tracking app...",
        "Design a note-taking app..."
    ];
    var el = document.querySelector(".composer-input");
    var phraseIdx = 0, charIdx = 0, deleting = false, pauseTicks = 0;
    var PAUSE_TYPE = 28, PAUSE_DEL = 6;
    var running = false;

    function tick() {
        if (el.innerText.trim() !== "" || document.activeElement === el) {
            running = false;
            return;
        }
        var phrase = phrases[phraseIdx];
        if (!deleting) {
            charIdx++;
            el.setAttribute("data-tw", phrase.substring(0, charIdx));
            if (charIdx === phrase.length) { deleting = true; pauseTicks = PAUSE_TYPE; }
        } else {
            if (pauseTicks > 0) { pauseTicks--; }
            else {
                charIdx--;
                el.setAttribute("data-tw", phrase.substring(0, charIdx));
                if (charIdx === 0) { deleting = false; pauseTicks = PAUSE_DEL; phraseIdx = (phraseIdx + 1) % phrases.length; }
            }
        }
        setTimeout(tick, deleting ? (pauseTicks > 0 ? 60 : 45) : 68);
    }

    function startTw() {
        if (running) return;
        running = true;
        charIdx = 0; deleting = false; pauseTicks = 0;
        el.setAttribute("data-tw", "");
        el.classList.add("tw-active");
        setTimeout(tick, 400);
    }

    el.addEventListener("focus", function() {
        running = false;
        el.classList.remove("tw-active");
    });

    el.addEventListener("blur", function() {
        if (el.innerText.trim() === "") {
            startTw();
        }
    });

    startTw();
})();

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
